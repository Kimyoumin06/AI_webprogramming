<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let s1 = new String("Hello1");
        let s2 = "Hello2"
        document.write(s1 + "<br>");
        document.write(s2 + "<br>");
        document.write(s1.length + "<br>");
        document.write(s1.toLowerCase() + "<br>");
        document.write(s1.toUpperCase() + "<br>");

        function checkID(){
            let s = document.getElementById("id").value;
            if(s.length < 6) alert("id는 6글자 이상이어야 합니다.");
            else alert("조건을 충족했습니다.");
        }
    </script>

    <input type="text" id="id" size=10>
    <button onclick="checkID()">검사</button>
</body>
</html>
