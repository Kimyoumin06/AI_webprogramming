        document.write((st2.replace("workman", "man")) + "<br>");
        arr = st2.split(' ');
        document.write(arr + "<br>");
        for(let i = 0; i < arr.length; i++){
            document.write(arr[i] + "<br>");
        }

        let a1 = "HEllo"; let a2 = "    A Good  workman     ";

        document.write(a1.startsWith("HE") + "<br>");
        document.write(a2.endsWith("HE") + "<br>");
        document.write(a2 + "<br>");
        document.write(a2.trim() + "<br>");

        let number = "100.89";
        document.write(100 + number + "<br>");
        document.write(100 + parseInt(number) + "<br>");
        document.write(100 + parseFloat(number) + "<br>");

        document.write('1+1' + "<br>");
        document.write(eval('1+1') + "<br>");
    </script>
