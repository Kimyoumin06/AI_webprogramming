<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="3">
        <tr>
            <td>섭씨온도</td>
            <td>화씨온도</td>
        </tr>
        <script>
            for(celsius = 0; celsius <= 10; celsius++){
                document.write("<tr><td>" + celsius + "</td><td>" + ((celsius * 9.0 / 5) + 32) + "</td></tr>");
            }
        </script>
    </table>

    <script>
        document.write("<h1>구구단표</h1>");
        document.write("<table border=2 width=50%")

        for(let i = 1; i <= 9; i++){
            document.write("<tr>");
            document.write("<td>" + i + "</td>");

            for(let j = 2; j <= 9; j++){
                document.write("<td>" + i * j + "</tdd>");
            }
            document.write("</tr>");
        }
    </script>
</body>
</html>
