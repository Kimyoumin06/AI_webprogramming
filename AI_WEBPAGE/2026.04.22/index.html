<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
    <script>
        let i = 1, sum = 0;
        do{
            sum = sum + i;
            i++;
        }while(i<=5);
        document.write("i : " + i + " | sum : " + sum);
    </script>

    <br>

    <script>
        i = 1; sum = 0;
        while(i<=5){
            sum = sum + i;
            i++;
        }
        document.write("i : " + i + " | sum : " + sum);
    </script>

    <br>

    <script>
        sum = 0;
        for(i=1;i<=5;i++){
            //sum = sum+i;
            sum += i;
        }
        document.write("i : " + i + " | sum : " + sum);
    </script>

    <script>

            document.write("<h" + i + ">" + "Hello" + i + "</h" + i + ">");
        }
    </script>

                document.write("<tr><td>" + v + "</td><td>" + (100 + v) + "</td><td>" + (200 + v) + "</td></tr>");
            }
