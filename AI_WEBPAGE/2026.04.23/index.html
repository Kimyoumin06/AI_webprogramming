<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let msg = "";
        for(let i=0; i < 5; i++){
            if(i == 3) continue;
            msg += i + "<br>";
        }
        document.write(msg);
    </script>

    <br>

    <script>
        let i = 0, j = 0;
        let v1 = 0, v2 = 0, v3 = 0;
        for(i = 1; i <= 3; i++){
            v1 = v1 + i;
            for(j = 1; j <= 3; j++){
                v2 = v2 + j;
            }
            v3 = v1 + v2;
        }
        let v4 = v1 + v2 + v3;
        document.write("v4 : " + v4);
    </script>
</body>
</html>
