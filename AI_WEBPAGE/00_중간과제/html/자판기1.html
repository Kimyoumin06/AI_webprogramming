<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>병원 무인카페 키오스크</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface2: #2e2e2e;
      --border: #3a3a3a;
      --accent: #c8a96e;
      --accent2: #e8c98e;
      --text: #f0ece4;
      --text2: #a09890;
      --text3: #6e6560;
      --danger: #d4645a;
      --success: #6aad8e;
      --info: #6a9bc4;
      --warning: #e0a84a;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── AUTH SCREEN ── */
    #authScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 24px;
    }

    .auth-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--accent);
      letter-spacing: 0.06em;
      margin-bottom: 4px;
      text-align: center;
    }

    .auth-logo span {
      font-size: 11px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text2);
      display: block;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      width: min(420px, 96vw);
      margin-top: 28px;
    }

    .auth-card h2 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .auth-card .auth-sub {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .auth-methods {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .auth-method-btn {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      color: var(--text);
    }

    .auth-method-btn:hover,
    .auth-method-btn.selected {
      border-color: var(--accent);
      background: rgba(200,169,110,0.08);
    }

    .auth-method-btn .method-icon { font-size: 24px; display: block; margin-bottom: 6px; }
    .auth-method-btn .method-label { font-size: 11px; color: var(--text2); }

    .auth-id-input-wrap { margin-bottom: 16px; }
    .auth-id-input-wrap label {
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 8px;
    }

    .auth-id-input-wrap input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .auth-id-input-wrap input:focus { border-color: var(--accent); }

    /* Demo patient list */
    .demo-patients {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }

    .demo-patients .demo-label {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .demo-patient-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .demo-patient-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      background: var(--surface);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .demo-patient-item:hover { background: rgba(200,169,110,0.1); }

    .demo-patient-item .dp-name { font-size: 13px; }
    .demo-patient-item .dp-id   { font-size: 11px; color: var(--text3); }
    .demo-patient-item .dp-cond {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }

    .cond-normal   { background: rgba(106,173,142,0.2); color: var(--success); }
    .cond-diabetes { background: rgba(212,100,90,0.2);  color: var(--danger);  }
    .cond-heart    { background: rgba(224,168,74,0.2);  color: var(--warning); }
    .cond-general  { background: rgba(106,155,196,0.2); color: var(--info);    }

    .btn-auth {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-auth:hover { background: var(--accent2); }

    /* ── MAIN APP (hidden until auth) ── */
    #appScreen { display: none; flex-direction: column; min-height: 100vh; }
    #appScreen.visible { display: flex; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--accent);
      letter-spacing: 0.06em;
    }

    .brand span {
      font-size: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text2);
      display: block;
      letter-spacing: 0.2em;
      margin-top: 1px;
      text-transform: uppercase;
    }

    /* Patient badge in header */
    .patient-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 12px;
    }

    .patient-badge .pb-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      background: rgba(200,169,110,0.15);
      border: 1px solid var(--accent);
      flex-shrink: 0;
    }

    .patient-badge .pb-name  { font-size: 13px; font-weight: 600; line-height: 1.2; }
    .patient-badge .pb-cond  { font-size: 10px; color: var(--text3); }

    .patient-cond-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      margin-left: 4px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 12px;
      text-align: right;
    }

    .card-badge .label  { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }
    .card-badge .amount { font-size: 16px; font-weight: 700; color: var(--accent); margin-top: 1px; }

    .btn-charge {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 8px;
      padding: 8px 13px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .btn-charge:hover { background: var(--accent); color: #1a1a1a; }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text3);
      border-radius: 8px;
      padding: 8px 13px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── HEALTH NOTICE BANNER ── */
    .health-banner {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      font-size: 12px;
      line-height: 1.5;
      border-bottom: 1px solid var(--border);
    }

    .health-banner.show { display: flex; }
    .health-banner .hb-icon { font-size: 18px; flex-shrink: 0; }
    .health-banner .hb-text { flex: 1; color: var(--text2); }
    .health-banner .hb-text strong { font-weight: 600; }

    .hb-diabetes { background: rgba(212,100,90,0.08); border-bottom-color: rgba(212,100,90,0.3); }
    .hb-diabetes .hb-icon-wrap { color: var(--danger); }

    .hb-heart    { background: rgba(224,168,74,0.08); border-bottom-color: rgba(224,168,74,0.3); }
    .hb-heart .hb-icon-wrap { color: var(--warning); }

    /* ── CATEGORY TABS ── */
    .category-bar {
      display: flex;
      gap: 8px;
      padding: 14px 24px;
      background: var(--surface);
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }

    .category-bar::-webkit-scrollbar { display: none; }

    .cat-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cat-btn.active, .cat-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #1a1a1a;
      font-weight: 500;
    }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
    }

    /* ── MENU GRID ── */
    .menu-section {
      flex: 1;
      padding: 20px 24px;
      overflow-y: auto;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    .menu-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 14px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
      user-select: none;
    }

    .menu-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    /* sold-out: can't click */
    .menu-card.sold-out,
    .menu-card.restricted {
      opacity: 0.42;
      pointer-events: none;
    }

    .menu-card .icon { font-size: 32px; margin-bottom: 10px; display: block; }
    .menu-card .name { font-size: 14px; font-weight: 500; line-height: 1.3; margin-bottom: 4px; }
    .menu-card .sub  { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
    .menu-card .price { font-size: 15px; font-weight: 700; color: var(--accent); }

    .status-tag {
      position: absolute;
      top: 10px; right: 10px;
      font-size: 10px;
      border-radius: 6px;
      padding: 2px 7px;
      font-weight: 600;
    }

    .tag-soldout    { background: var(--danger);  color: #fff; }
    .tag-restricted { background: var(--warning); color: #1a1a1a; }

    /* ── ORDER PANEL ── */
    .order-panel {
      width: 310px;
      min-width: 290px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .order-panel h2 {
      font-size: 14px;
      font-weight: 500;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .order-items {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .order-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 160px;
      color: var(--text3);
      font-size: 13px;
      gap: 8px;
    }

    .order-empty .empty-icon { font-size: 28px; }

    .order-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; } }

    .order-item .item-icon { font-size: 20px; flex-shrink: 0; }
    .order-item .item-info { flex: 1; }
    .order-item .item-name { font-size: 13px; font-weight: 500; }
    .order-item .item-price { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .qty-btn {
      width: 26px; height: 26px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }

    .qty-btn:hover { background: var(--border); }
    .qty-count { font-size: 13px; font-weight: 500; min-width: 18px; text-align: center; }

    /* ── SUMMARY ── */
    .order-summary {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .summary-row.total {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .summary-row.total .val { color: var(--accent); }

    .btn-pay {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-pay:hover { background: var(--accent2); }
    .btn-pay:active { transform: scale(0.98); }
    .btn-pay:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; transform: none; }

    .btn-clear {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text2);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 30px 28px;
      width: min(380px, 92vw);
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal .modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

    .charge-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .charge-opt {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .charge-opt:hover { border-color: var(--accent); background: rgba(200,169,110,0.1); }

    .modal-btns { display: flex; gap: 10px; }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }

    .modal-btn.cancel  { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
    .modal-btn.confirm { background: var(--accent); color: #1a1a1a; }
    .modal-btn:hover { opacity: 0.85; }

    /* ── RECEIPT MODAL ── */
    .receipt { text-align: center; }
    .receipt .receipt-icon { font-size: 42px; margin-bottom: 12px; }
    .receipt h3 { font-size: 20px; margin-bottom: 4px; }
    .receipt .receipt-items {
      text-align: left;
      margin: 20px 0;
      border-top: 1px dashed var(--border);
      border-bottom: 1px dashed var(--border);
      padding: 14px 0;
    }
    .receipt .r-item { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
    .receipt .r-item .r-name { color: var(--text2); }
    .receipt .r-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; margin-top: 14px; }
    .receipt .r-total span:last-child { color: var(--accent); }
    .receipt .r-change { font-size: 13px; color: var(--text2); margin-top: 6px; text-align: right; }

    /* ── OPTION MODAL ── */
    .option-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0 20px; }

    .opt-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
      transition: all 0.15s;
    }

    .opt-chip.selected { background: rgba(200,169,110,0.15); border-color: var(--accent); color: var(--accent); }
    .opt-chip.disabled-opt { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    .opt-section { margin-bottom: 16px; }
    .opt-label   { font-size: 11px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }

    /* health warning inside option modal */
    .health-warn-box {
      display: none;
      align-items: flex-start;
      gap: 8px;
      background: rgba(224,168,74,0.1);
      border: 1px solid rgba(224,168,74,0.3);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--warning);
      line-height: 1.5;
    }

    .health-warn-box.show { display: flex; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success);
      color: #fff;
      padding: 12px 22px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      z-index: 300;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }

    .toast.show  { transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--danger); }
    .toast.warn  { background: var(--warning); color: #1a1a1a; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .order-panel { display: none; }

      .fab-cart {
        display: flex;
        position: fixed;
        bottom: 20px; right: 20px;
        background: var(--accent);
        color: #1a1a1a;
        border: none;
        border-radius: 50px;
        padding: 14px 20px;
        font-size: 14px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        gap: 8px;
        align-items: center;
        box-shadow: 0 4px 20px rgba(200,169,110,0.3);
        z-index: 150;
      }

      .fab-cart .fab-count {
        background: #1a1a1a;
        color: var(--accent);
        border-radius: 50%;
        width: 22px; height: 22px;
        display: flex; align-items: center; justify-content: center;
        font-size: 12px;
      }

      .menu-grid { grid-template-columns: repeat(2, 1fr); }

      .mobile-order-panel {
        display: flex !important;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        flex-direction: column;
        max-height: 80vh;
        z-index: 160;
        border-radius: 18px 18px 0 0;
        transform: translateY(100%);
        transition: transform 0.3s ease;
      }

      .mobile-order-panel.open { transform: translateY(0); }
      .patient-badge .pb-cond { display: none; }
    }

    @media (min-width: 701px) {
      .fab-cart { display: none; }
      .mobile-order-panel { display: none !important; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════
     AUTH SCREEN
══════════════════════════════════ -->
<div id="authScreen">
  <div class="auth-logo">
    Brew &amp; Bean
    <span>Hospital Café Kiosk</span>
  </div>

  <div class="auth-card">
    <h2>🏥 환자 인증</h2>
    <p class="auth-sub">

<!-- ══════════════════════════════════
     SCRIPT
══════════════════════════════════ -->
<script>
// ────────────────────────────────────────────────────────────
// 1. 환자 데이터
//    condition: 'normal' | 'diabetes' | 'heart' | 'general'
//    - normal   : 모든 메뉴 이용 가능 (당도 제한 없음)
//    - diabetes : 카페인 주의 + 당도 '보통' 이하만 선택 가능
//                 (고당도 칩 비활성화)
//    - heart    : 카페인 함유 음료 주문 불가 (coffee 카테고리 제한)
//    - general  : 모든 메뉴 이용 가능 (당도 제한 없음)
// ────────────────────────────────────────────────────────────
const PATIENTS = [
  { id: 'P001', name: '김민준', condition: 'normal',   avatar: '🧑', room: '301호' },
  { id: 'P002', name: '이서연', condition: 'diabetes', avatar: '👩', room: '214호' },
  { id: 'P003', name: '박도현', condition: 'heart',    avatar: '🧓', room: '508호' },
  { id: 'P004', name: '최유나', condition: 'general',  avatar: '👧', room: '120호' },
];

// 조건 표시 설정
const COND_CONFIG = {
  normal:   { label: '일반',     cls: 'cond-normal',   bannerCls: '',             bannerIcon: '',   bannerMsg: '' },
  diabetes: {
    label: '당뇨 주의',
    cls:   'cond-diabetes',
    bannerCls:  'hb-diabetes',
    bannerIcon: '🩺',
    bannerMsg:  '<strong>당뇨 환자 안내:</strong> 고카페인 음료는 주의가 필요하며, 당도 옵션은 <strong>보통</strong> 이하로 제한됩니다.'
  },
  heart: {
    label: '심장 질환 주의',
    cls:   'cond-heart',
    bannerCls:  'hb-heart',
    bannerIcon: '💊',
    bannerMsg:  '<strong>심장 질환 환자 안내:</strong> 카페인 함유 음료(커피 카테고리)는 주문이 제한됩니다.'
  },
  general:  { label: '일반',     cls: 'cond-general',  bannerCls: '',             bannerIcon: '',   bannerMsg: '' },
};

// 당도 단계 순서 (높을수록 고당도)
const SUGAR_OPTS  = ['단맛 없음', '적게', '보통', '달게'];
const SUGAR_LIMIT = { diabetes: '보통' };  // 이 값 '이하'만 허용

// ────────────────────────────────────────────────────────────
// 2. 메뉴 데이터
// ────────────────────────────────────────────────────────────
const MENU = [
  // Coffee
  { id:1,  cat:'coffee',    icon:'☕', name:'아메리카노',      sub:'Americano',        price:3500, tempOpt:true,  sizeOpt:true,  soldOut:false, caffeine:true  },
  { id:2,  cat:'coffee',    icon:'☕', name:'카페 라떼',       sub:'Café Latte',       price:4000, tempOpt:true,  sizeOpt:true,  soldOut:false, caffeine:true  },
  { id:3,  cat:'coffee',    icon:'☕', name:'카푸치노',        sub:'Cappuccino',       price:4200, tempOpt:true,  sizeOpt:false, soldOut:false, caffeine:true  },
  { id:4,  cat:'coffee',    icon:'☕', name:'바닐라 라떼',     sub:'Vanilla Latte',    price:4500, tempOpt:true,  sizeOpt:true,  soldOut:false, caffeine:true  },
  { id:5,  cat:'coffee',    icon:'☕', name:'돌체 라떼',       sub:'Dolce Latte',      price:4800, tempOpt:true,  sizeOpt:false, soldOut:false, caffeine:true  },
  { id:6,  cat:'coffee',    icon:'☕', name:'에스프레소',      sub:'Espresso',         price:3000, tempOpt:false, sizeOpt:false, soldOut:false, caffeine:true  },
  // Non-coffee
  { id:7,  cat:'nonCoffee', icon:'🍫', name:'초코 라떼',       sub:'Choco Latte',      price:4200, tempOpt:true,  sizeOpt:true,  soldOut:false, caffeine:false },
  { id:8,  cat:'nonCoffee', icon:'🍵', name:'말차 라떼',       sub:'Matcha Latte',     price:4500, tempOpt:true,  sizeOpt:true,  soldOut:false, caffeine:false },
  { id:9,  cat:'nonCoffee', icon:'🥛', name:'딸기 라떼',       sub:'Strawberry Latte', price:4800, tempOpt:true,  sizeOpt:false, soldOut:true,  caffeine:false },
  // Smoothie
  { id:10, cat:'smoothie',  icon:'🥤', name:'딸기 스무디',     sub:'Strawberry',       price:5500, tempOpt:false, sizeOpt:true,  soldOut:false, caffeine:false },
  { id:11, cat:'smoothie',  icon:'🥤', name:'망고 스무디',     sub:'Mango',            price:5500, tempOpt:false, sizeOpt:true,  soldOut:false, caffeine:false },
  { id:12, cat:'smoothie',  icon:'🥤', name:'블루베리 스무디', sub:'Blueberry',        price:5800, tempOpt:false, sizeOpt:false, soldOut:false, caffeine:false },
  // Tea
  { id:13, cat:'tea',       icon:'🫖', name:'얼그레이 티',     sub:'Earl Grey',        price:3500, tempOpt:true,  sizeOpt:false, soldOut:false, caffeine:false },
  { id:14, cat:'tea',       icon:'🫖', name:'캐모마일 티',     sub:'Chamomile',        price:3500, tempOpt:true,  sizeOpt:false, soldOut:false, caffeine:false },
  { id:15, cat:'tea',       icon:'🫖', name:'히비스커스 티',   sub:'Hibiscus',         price:3800, tempOpt:true,  sizeOpt:false, soldOut:false, caffeine:false },
  // Ade
  { id:16, cat:'ade',       icon:'🍊', name:'자몽 에이드',     sub:'Grapefruit Ade',   price:4500, tempOpt:false, sizeOpt:true,  soldOut:false, caffeine:false },
  { id:17, cat:'ade',       icon:'🍋', name:'레몬 에이드',     sub:'Lemon Ade',        price:4200, tempOpt:false, sizeOpt:true,  soldOut:false, caffeine:false },
  { id:18, cat:'ade',       icon:'🍓', name:'딸기 에이드',     sub:'Strawberry Ade',   price:4500, tempOpt:false, sizeOpt:true,  soldOut:false, caffeine:false },
];

const SIZE_PRICE = { Regular: 0, Large: 500, ExtraLarge: 1000 };
const SIZE_LABEL = { Regular: 'Regular', Large: 'Large (+₩500)', ExtraLarge: 'XL (+₩1,000)' };
const TEMP_OPTS  = ['ICE', 'HOT'];

// ────────────────────────────────────────────────────────────
// 3. 상태 변수
// ────────────────────────────────────────────────────────────
let currentPatient = null;   // 인증된 환자 객체
let cardBalance    = 50000;
let cart           = [];
let currentItem    = null;
let selTemp        = '';
let selSize        = '';
let selSugar       = '';
let currentCategory = 'all';
let chargeAmount   = 0;
let selectedMethod = 'card';

// ────────────────────────────────────────────────────────────
// 4. 환자 조건 헬퍼
// ────────────────────────────────────────────────────────────
function isRestricted(item) {
  if (!currentPatient) return false;
  const cond = currentPatient.condition;
  // 심장 질환: 카페인 음료 전체 제한
  if (cond === 'heart' && item.caffeine) return true;
  return false;
}

function getAllowedSugars() {
  if (!currentPatient) return SUGAR_OPTS;
  const limit = SUGAR_LIMIT[currentPatient.condition];
  if (!limit) return SUGAR_OPTS;
  const idx = SUGAR_OPTS.indexOf(limit);
  return SUGAR_OPTS.slice(0, idx + 1);
}

// ────────────────────────────────────────────────────────────
// 5. 인증 화면 초기화
// ────────────────────────────────────────────────────────────
function initAuthScreen() {
  const list = document.getElementById('demoPatientList');
  list.innerHTML = PATIENTS.map(p => {
    const cfg = COND_CONFIG[p.condition];
    return `
      <div class="demo-patient-item" onclick="quickAuth('${p.id}')">
        <span class="dp-name">${p.avatar} ${p.name} <span style="color:var(--text3);font-size:11px;">(${p.room})</span></span>
        <span class="dp-id">${p.id}</span>
        <span class="dp-cond ${cfg.cls}">${cfg.label}</span>
      </div>
    `;
  }).join('');
}

function selectMethod(m) {
  selectedMethod = m;
  ['card','band','app'].forEach(k => {
    document.getElementById('method' + k.charAt(0).toUpperCase() + k.slice(1))
      .classList.toggle('selected', k === m);
  });
}

function quickAuth(id) {
  document.getElementById('patientIdInput').value = id;
  doAuth();
}

function doAuth() {
  const inputId = document.getElementById('patientIdInput').value.trim().toUpperCase();
  if (!inputId) { showToast('환자 ID를 입력하세요.', 'error'); return; }

  const patient = PATIENTS.find(p => p.id === inputId);
  if (!patient) {
    showToast('등록되지 않은 환자 ID입니다.', 'error');
    return;
  }

  currentPatient = patient;
  cardBalance    = 50000; // 인증 시 잔액 초기화 (데모)
  cart           = [];

  // 헤더 환자 정보 업데이트
  const cfg = COND_CONFIG[patient.condition];
  document.getElementById('pbAvatar').textContent = patient.avatar;
  document.getElementById('pbName').textContent   = patient.name;
  document.getElementById('pbCond').innerHTML =
    `${patient.room} · <span class="patient-cond-tag ${cfg.cls}">${cfg.label}</span>`;

  // 건강 배너
  const banner = document.getElementById('healthBanner');
  if (cfg.bannerMsg) {
    banner.className = 'health-banner show ' + cfg.bannerCls;
    document.getElementById('hbIcon').textContent = cfg.bannerIcon;
    document.getElementById('hbText').innerHTML   = cfg.bannerMsg;
  } else {
    banner.className = 'health-banner';
  }

  // 화면 전환
  document.getElementById('authScreen').style.display = 'none';
  const app = document.getElementById('appScreen');
  app.classList.add('visible');

  // 카테고리 초기화
  currentCategory = 'all';
  document.querySelectorAll('.cat-btn').forEach((b, i) => b.classList.toggle('active', i === 0));

  renderAll();
  showToast(`${patient.name}님, 환영합니다! 😊`);
}

function logout() {
  currentPatient = null;
  cart = [];
  document.getElementById('patientIdInput').value = '';
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('healthBanner').className = 'health-banner';
}

// ────────────────────────────────────────────────────────────
// 6. 렌더링
// ────────────────────────────────────────────────────────────
function fmt(n) { return '₩' + n.toLocaleString('ko-KR'); }

function renderMenu() {
  const grid  = document.getElementById('menuGrid');
  const items = currentCategory === 'all' ? MENU : MENU.filter(m => m.cat === currentCategory);

  grid.innerHTML = items.map(item => {
    const restricted = isRestricted(item);
    let cls = '';
    let tag = '';
    if (item.soldOut) {
      cls = ' sold-out';
      tag = `<span class="status-tag tag-soldout">품절</span>`;
    } else if (restricted) {
      cls = ' restricted';
      tag = `<span class="status-tag tag-restricted">제한</span>`;
    }
    const click = (!item.soldOut && !restricted) ? `onclick="openOptionModal(${item.id})"` : '';
    return `
      <div class="menu-card${cls}" ${click}>
        ${tag}
        <span class="icon">${item.icon}</span>
        <div class="name">${item.name}</div>
        <div class="sub">${item.sub}</div>
        <div class="price">${fmt(item.price)}</div>
      </div>
    `;
  }).join('');
}

function renderOrder(suffix) {
  const itemsEl   = document.getElementById('orderItems'   + suffix);
  const summaryEl = document.getElementById('orderSummary' + suffix);

  if (cart.length === 0) {
    itemsEl.innerHTML = `<div class="order-empty"><span class="empty-icon">🛒</span>아직 담은 항목이 없어요</div>`;
    summaryEl.innerHTML = '';
    return;
  }

  itemsEl.innerHTML = cart.map((c, i) => {
    const label = [c.temp, c.size !== 'Regular' ? c.size : '', c.sugar !== '보통' ? c.sugar : ''].filter(Boolean).join(' · ');
    return `
      <div class="order-item">
        <span class="item-icon">${c.menuItem.icon}</span>
        <div class="item-info">
          <div class="item-name">${c.menuItem.name}</div>
          <div class="item-price">${fmt(c.unitPrice)}${label ? ` <span style="color:var(--text3);font-size:10px;">${label}</span>` : ''}</div>
        </div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
          <span class="qty-count">${c.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i},  1)">+</button>
        </div>
      </div>
    `;
  }).join('');

  const total     = getTotal();
  const itemCount = cart.reduce((s, c) => s + c.qty, 0);

  summaryEl.innerHTML = `
    <div class="summary-row"><span>항목 수</span><span>${itemCount}개</span></div>
    <div class="summary-row total"><span>합계</span><span class="val">${fmt(total)}</span></div>
    <button class="btn-pay" onclick="openPayModal()" ${total > cardBalance ? 'disabled title="잔액 부족"' : ''}>
      ${total > cardBalance ? '💳 잔액 부족' : '💳 카드 결제'}
    </button>
    <button class="btn-clear" onclick="clearCart()">전체 취소</button>
  `;
}

function renderAll() {
  renderMenu();
  renderOrder('Desktop');
  renderOrder('Mobile');
  document.getElementById('fabCount').textContent = cart.reduce((s, c) => s + c.qty, 0);
  document.getElementById('cardBalance').textContent = fmt(cardBalance);
}

// ────────────────────────────────────────────────────────────
// 7. 카테고리 필터
// ────────────────────────────────────────────────────────────
function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu();
}

// ────────────────────────────────────────────────────────────
// 8. 옵션 모달
// ────────────────────────────────────────────────────────────
function openOptionModal(id) {
  currentItem = MENU.find(m => m.id === id);
  selTemp  = currentItem.tempOpt ? 'ICE' : '';
  selSize  = currentItem.sizeOpt ? 'Regular' : '';

  // 당뇨 환자: 허용 당도 중 첫 번째를 기본값으로
  const allowed = getAllowedSugars();
  selSugar = allowed.includes('보통') ? '보통' : allowed[allowed.length - 1];

  document.getElementById('optModalName').textContent  = currentItem.name;
  document.getElementById('optModalPrice').textContent = fmt(currentItem.price) + '부터';

  // 건강 경고 박스 (당뇨 + 카페인 메뉴)
  const warnBox  = document.getElementById('healthWarnBox');
  const warnText = document.getElementById('healthWarnText');
  if (currentPatient && currentPatient.condition === 'diabetes' && currentItem.caffeine) {
    warnText.textContent = '당뇨 환자에게 카페인은 혈당 변동을 유발할 수 있습니다. 섭취량에 주의하세요.';
    warnBox.classList.add('show');
  } else {
    warnBox.classList.remove('show');
  }

  // 온도 옵션
  const tempEl = document.getElementById('optTemp');
  if (currentItem.tempOpt) {
    tempEl.innerHTML = TEMP_OPTS.map(t =>
      `<button class="opt-chip${t === selTemp ? ' selected' : ''}" onclick="pickOpt('temp','${t}',this)">${t}</button>`
    ).join('');
    tempEl.closest('.opt-section').style.display = '';
  } else {
    tempEl.closest('.opt-section').style.display = 'none';
  }

  // 사이즈 옵션
  const sizeEl = document.getElementById('optSize');
  if (currentItem.sizeOpt) {
    sizeEl.innerHTML = Object.keys(SIZE_PRICE).map(s =>
      `<button class="opt-chip${s === selSize ? ' selected' : ''}" onclick="pickOpt('size','${s}',this)">${SIZE_LABEL[s]}</button>`
    ).join('');
    document.getElementById('sizeSection').style.display = '';
  } else {
    document.getElementById('sizeSection').style.display = 'none';
  }

  // 당도 옵션 — 환자 조건에 따라 비활성화
  const sugarEl = document.getElementById('optSugar');
  const limit   = SUGAR_LIMIT[currentPatient ? currentPatient.condition : ''] || null;
  const limitIdx = limit ? SUGAR_OPTS.indexOf(limit) : SUGAR_OPTS.length - 1;

  sugarEl.innerHTML = SUGAR_OPTS.map((s, i) => {
    const isDisabled = (i > limitIdx);
    const isSel      = (s === selSugar);
    return `<button class="opt-chip${isSel ? ' selected' : ''}${isDisabled ? ' disabled-opt' : ''}"
      ${isDisabled ? '' : `onclick="pickOpt('sugar','${s}',this)"`}>${s}${isDisabled ? ' 🚫' : ''}</button>`;
  }).join('');

  openModal('optionModal');
}

function pickOpt(type, val, btn) {
  if (type === 'temp')  selTemp  = val;
  if (type === 'size')  selSize  = val;
  if (type === 'sugar') selSugar = val;
  btn.closest('.option-grid').querySelectorAll('.opt-chip:not(.disabled-opt)')
    .forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function addToCart() {
  if (!currentItem) return;
  const sizeExtra = currentItem.sizeOpt ? (SIZE_PRICE[selSize] || 0) : 0;
  const unitPrice = currentItem.price + sizeExtra;

  const existing = cart.find(c =>
    c.menuItem.id === currentItem.id &&
    c.temp  === selTemp  &&
    c.size  === selSize  &&
    c.sugar === selSugar
  );

  if (existing) {
    existing.qty++;
  } else {
    cart.push({
      menuItem: currentItem,
      temp: selTemp,
      size: selSize || 'Regular',
      sugar: selSugar,
      qty: 1,
      unitPrice
    });
  }

  closeModal('optionModal');
  showToast(`${currentItem.name} 담았어요!`);
  renderAll();
}

// ────────────────────────────────────────────────────────────
// 9. 장바구니 조작
// ────────────────────────────────────────────────────────────
function changeQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  renderAll();
}

function clearCart() {
  cart = [];
  renderAll();
}

function getTotal() {
  return cart.reduce((s, c) => s + c.unitPrice * c.qty, 0);
}

// ────────────────────────────────────────────────────────────
// 10. 결제
// ────────────────────────────────────────────────────────────
function openPayModal() {
  const total   = getTotal();
  const details = cart.map(c => {
    const label = [c.temp, c.size !== 'Regular' ? c.size : '', c.sugar !== '보통' ? c.sugar : ''].filter(Boolean).join(', ');
    return `${c.menuItem.name}${label ? ` (${label})` : ''} × ${c.qty} = ${fmt(c.unitPrice * c.qty)}`;
  }).join('<br>');

  document.getElementById('payDetails').innerHTML =
    details +
    `<br><br><strong style="color:var(--text)">합계: ${fmt(total)}</strong>
     <br><span style="color:var(--text3)">카드 잔액: ${fmt(cardBalance)} → ${fmt(cardBalance - total)}</span>`;

  openModal('payModal');
}

function doPayment() {
  const total = getTotal();
  if (total > cardBalance) { showToast('잔액이 부족합니다!', 'error'); return; }

  cardBalance -= total;

  const items = cart.map(c => ({
    name:  c.menuItem.name + (c.temp ? ` (${c.temp})` : ''),
    qty:   c.qty,
    price: c.unitPrice * c.qty
  }));

  document.getElementById('receiptItems').innerHTML = items.map(it =>
    `<div class="r-item"><span class="r-name">${it.name} ×${it.qty}</span><span>${fmt(it.price)}</span></div>`
  ).join('');
  document.getElementById('receiptTotal').textContent   = fmt(total);
  document.getElementById('receiptBalance').textContent = `잔여 잔액: ${fmt(cardBalance)}`;

  cart = [];
  closeModal('payModal');
  openModal('receiptModal');
  renderAll();
}

// ────────────────────────────────────────────────────────────
// 11. 충전
// ────────────────────────────────────────────────────────────
function openChargeModal() {
  chargeAmount = 0;
  document.getElementById('customCharge').value = '';
  openModal('chargeModal');
}

function selectCharge(amount) {
  chargeAmount = amount;
  document.getElementById('customCharge').value = amount;
}

function doCharge() {
  const custom = parseInt(document.getElementById('customCharge').value) || 0;
  const amount = custom > 0 ? custom : chargeAmount;
  if (amount < 1000) { showToast('최소 1,000원 이상 충전하세요.', 'error'); return; }
  cardBalance += amount;
  closeModal('chargeModal');
  showToast(`${fmt(amount)} 충전 완료!`);
  renderAll();
}

// ────────────────────────────────────────────────────────────
// 12. 모달 / 패널 유틸
// ────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

document.querySelectorAll('.modal-backdrop').forEach(bd => {
  bd.addEventListener('click', e => { if (e.target === bd) bd.classList.remove('show'); });
});

function openMobilePanel()  { document.getElementById('mobileOrderPanel').classList.add('open'); }
function closeMobilePanel() { document.getElementById('mobileOrderPanel').classList.remove('open'); }

// ────────────────────────────────────────────────────────────
// 13. 토스트
// ────────────────────────────────────────────────────────────
function showToast(msg, type) {
  // type: 'error' | 'warn' | undefined(success)
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (type ? ' ' + type : '');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

// ────────────────────────────────────────────────────────────
// 14. 초기화
// ────────────────────────────────────────────────────────────
initAuthScreen();
</script>
